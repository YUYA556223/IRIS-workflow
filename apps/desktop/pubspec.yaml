name: iris_desktop
description: "IRIS-workflow Windows desktop client."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # P9: Windows MSIX packaging.
  # `dart run msix:create` で MSIX を生成する。詳細は ios-style WIDGET_SETUP に
  # 倣い、infra/packaging/windows-msix/README.md を参照。
  msix: ^3.16.7

flutter:
  uses-material-design: true

# ===========================================================================
# msix_config (P9): apps/desktop を Windows ストア配布形式 (MSIX) で
# パッケージするための設定。`flutter build windows --release` を先に走らせ、
# その後 `dart run msix:create` で `build/windows/x64/runner/Release/iris-desktop.msix`
# (相当の出力) を作る。
#
# 署名は: (1) 既存の `.pfx` 証明書を参照、(2) 自前生成 (PowerShell の
# New-SelfSignedCertificate)、(3) Store 配布なら Microsoft の証明書を使う。
# certificate_path / certificate_password を **コミットしない** こと。
# 開発用には dev cert 用の環境変数を export しておく。
# ===========================================================================
msix_config:
  display_name: IRIS-workflow
  publisher_display_name: Memorylab Inc.
  identity_name: jp.memorylab.iris.desktop
  msix_version: 0.1.0.0
  logo_path: windows\runner\resources\app_icon.ico
  architecture: x64
  capabilities: internetClient, runFullTrust
  # store: true にすると Microsoft Store 用の構成 (証明書不要、ストア署名)
  store: false
  # ---- ローカル sideload 用 (オプション) ----
  # certificate_path: C:\path\to\iris-signing.pfx
  # certificate_password: ${env:IRIS_SIGN_PASSWORD}
  # ---- 自動インストール用 (任意) ----
  install_certificate: false
